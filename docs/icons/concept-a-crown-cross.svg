<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Subtle warm glow behind the symbol -->
    <radialGradient id="glow" cx="50%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#D4A845" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1B2A4A" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold gradient for main elements -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDCD6B"/>
      <stop offset="45%" stop-color="#D4A845"/>
      <stop offset="100%" stop-color="#A8832A"/>
    </linearGradient>
    <!-- Lighter gold for crown peaks -->
    <linearGradient id="goldLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2D97A"/>
      <stop offset="100%" stop-color="#D4A845"/>
    </linearGradient>
  </defs>

  <!-- Background: deep royal navy -->
  <rect width="1024" height="1024" fill="#1B2A4A"/>
  <!-- Ambient glow -->
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!--
    COMPOSITION
    The cross is vertically centered with the crown sitting naturally on top.
    Cross center: x=512
    Crown band top: y=260, Crown band bottom: y=310
    Cross vertical beam: y=310 to y=780
    Cross horizontal beam: y=410 to y=500
  -->

  <!-- ============ CROSS ============ -->
  <!-- Vertical beam -->
  <rect x="468" y="310" width="88" height="470" rx="6" fill="url(#gold)"/>
  <!-- Horizontal beam -->
  <rect x="332" y="410" width="360" height="88" rx="6" fill="url(#gold)"/>

  <!-- ============ CROWN ============ -->
  <!-- Crown base band - spans wider than the cross vertical beam -->
  <rect x="358" y="268" width="308" height="48" rx="8" fill="url(#gold)"/>

  <!-- Five crown peaks as a single elegant path -->
  <path d="
    M 358,268
    L 358,198
    L 400,248
    L 434,158
    L 472,248
    L 512,108
    L 552,248
    L 590,158
    L 624,248
    L 666,198
    L 666,268
    Z
  " fill="url(#goldLight)"/>

  <!-- Jewel circles at the tips of peaks (dark inset style) -->
  <circle cx="358" cy="198" r="12" fill="#243558"/>
  <circle cx="434" cy="158" r="12" fill="#243558"/>
  <circle cx="512" cy="108" r="14" fill="#243558"/>
  <circle cx="590" cy="158" r="12" fill="#243558"/>
  <circle cx="666" cy="198" r="12" fill="#243558"/>

  <!-- Bright jewel dots inside the dark circles -->
  <circle cx="358" cy="198" r="6" fill="#E8C35A"/>
  <circle cx="434" cy="158" r="6" fill="#E8C35A"/>
  <circle cx="512" cy="108" r="7" fill="#F0D06A"/>
  <circle cx="590" cy="158" r="6" fill="#E8C35A"/>
  <circle cx="666" cy="198" r="6" fill="#E8C35A"/>

  <!-- Crown band decorative dots -->
  <circle cx="410" cy="292" r="7" fill="#B8912E" opacity="0.6"/>
  <circle cx="462" cy="292" r="7" fill="#B8912E" opacity="0.6"/>
  <circle cx="512" cy="292" r="7" fill="#B8912E" opacity="0.6"/>
  <circle cx="562" cy="292" r="7" fill="#B8912E" opacity="0.6"/>
  <circle cx="614" cy="292" r="7" fill="#B8912E" opacity="0.6"/>

  <!-- Thin highlight line at top of crown band -->
  <rect x="368" y="270" width="288" height="3" rx="1.5" fill="#F2D97A" opacity="0.4"/>
</svg>