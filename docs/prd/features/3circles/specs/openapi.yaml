    # ── Error Schemas ──────────────────────────────────────
    ErrorResponse:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          minItems: 1
          items:
            type: object
            required: [code, title, status]
            properties:
              id:
                type: string
                format: uuid
                description: Unique identifier for this error occurrence
              code:
                type: string
                pattern: '^rr:0x000B[0-9A-F]{4}$'
                description: Three Circles domain error code (0x000B prefix)
                example: "rr:0x000B0001"
              status:
                type: integer
                description: HTTP status code
              title:
                type: string
                description: Human-readable error summary
              detail:
                type: string
                description: Occurrence-specific description
              correlationId:
                type: string
                format: uuid
                description: Correlation ID for distributed tracing
              source:
                type: object
                properties:
                  pointer:
                    type: string
                    description: JSON Pointer (RFC 6901) to request field
                  parameter:
                    type: string
                    description: Query/path parameter name
                  header:
                    type: string
                    description: Header name
              links:
                type: object
                properties:
                  about:
                    type: string
                    format: uri
                    description: URI for this error occurrence
                  type:
                    type: string
                    format: uri
                    description: URI for error type documentation

  responses:
    Unauthorized:
      description: Unauthorized - Missing or invalid authentication
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: Bearer realm="Regal Recovery"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errors:
              - id: "eec33bf0-6bcc-4813-ae7e-0a70e8e53c3b"
                code: "rr:0x000B0401"
                status: 401
                title: "Unauthorized"
                detail: "Missing or invalid access token"
                correlationId: "fe8793b2-1bf0-4d29-bf10-adcf72640ec5"
                links:
                  about: "https://api.regalrecovery.app/errors/auth"

    NotFound:
      description: Not Found - Resource does not exist or user lacks permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errors:
              - id: "7f3a8b2c-1e4d-4c9b-b0a1-5e6f7a8b9c0d"
                code: "rr:0x000B0404"
                status: 404
                title: "Not Found"
                detail: "Circle set does not exist"
                correlationId: "8e2b9a3c-2f5e-5d0c-c1b2-6f7g8h9i0j1k"

    FeatureDisabled:
      description: Feature flag `feature.3circles` is disabled (fail closed)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errors:
              - id: "9a4b5c6d-3f7e-6d1e-d2c3-7g8h9i0j1k2l"
                code: "rr:0x000B0404"
                status: 404
                title: "Feature Not Available"
                detail: "Three Circles feature is not enabled for this account"
                correlationId: "0f1g2h3i-4j5k-7l8m-e3d4-8h9i0j1k2l3m"

    ValidationError:
      description: Unprocessable Entity - Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            errors:
              - id: "1b5c6d7e-4g8h-8e2f-f4e5-9i0j1k2l3m4n"
                code: "rr:0x000B0422"
                status: 422
                title: "Validation Error"
                detail: "Inner circle requires at least one behavior to commit"
                correlationId: "2c6d7e8f-5h9i-9f3g-g5f6-0j1k2l3m4n5o"
                source:
                  pointer: "/innerCircle"
