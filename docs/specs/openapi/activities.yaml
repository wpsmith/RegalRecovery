openapi: 3.1.0

info:
  title: Regal Recovery Activities API
  version: 1.0.0
  description: |
    Recovery activities tracking API for Regal Recovery.

    Covers all recovery activities including:
    - Daily sobriety commitments (morning and evening)
    - Journal entries (bullets, free-form, prompted, structured, emotional, time-based)
    - Check-ins (daily, evening, person-specific)
    - FASTER Scale assessments
    - Personal Craziness Index (PCI)
    - Urge logs with emergency tools integration
    - Mood ratings (multiple per day)
    - Gratitude entries
    - Phone call logs
    - Prayer logs
    - Meeting attendance logs
    - Exercise and nutrition tracking
    - Integrity inventory
    - Acting-in behaviors
    - Post-mortem analysis
    - Financial tracking
    - Step work
    - Devotional completions
    - Goals (weekly/daily)
    - Spouse check-in preparation (FANOS/FITNAP)

    All activity timestamps are immutable once recorded. Activities support optional ephemeral mode (auto-deleted after 30 days).
  contact:
    name: Regal Recovery Platform Team
  license:
    name: Proprietary

servers:
  - url: https://api.regalrecovery.com/v1
    description: Production
  - url: https://api.staging.regalrecovery.com/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Commitments
    description: Daily sobriety commitments (morning/evening)
  - name: Journals
    description: Free-form and prompted journaling
  - name: Emotional Journal
    description: Emotional awareness journaling with GPS and selfie
  - name: Time Journal
    description: Interval-based journaling with sensor data
  - name: Check-Ins
    description: Daily recovery check-ins
  - name: Person Check-Ins
    description: Spouse, sponsor, counselor check-ins
  - name: FASTER Scale
    description: FASTER Scale relapse stage assessments
  - name: PCI
    description: Personal Craziness Index
  - name: Urges
    description: Urge logging and emergency tools
  - name: Mood
    description: Mood ratings
  - name: Gratitude
    description: Gratitude entries
  - name: Phone Calls
    description: Phone call logs
  - name: Prayer
    description: Prayer logs
  - name: Meetings
    description: Meeting attendance logs
  - name: Exercise
    description: Physical activity tracking
  - name: Nutrition
    description: Nutrition and meal tracking
  - name: Devotionals
    description: Devotional completion logs
  - name: Integrity Inventory
    description: Daily integrity inventory
  - name: Acting-In
    description: Acting-in behaviors (outer circle)
  - name: Post-Mortem
    description: Post-relapse analysis
  - name: Financial
    description: Financial tracking
  - name: Step Work
    description: 12-step work entries
  - name: Goals
    description: Recovery goals (weekly/daily)
  - name: Spouse Check-In Prep
    description: FANOS/FITNAP spouse check-in preparation

paths:
  /activities/commitments/morning:
    post:
      operationId: createMorningCommitment
      tags: [Commitments]
      summary: Submit morning sobriety commitment
      description: |
        Record morning sobriety commitment for the day.

        Part of the core daily recovery routine. Tracked as a consecutive-day streak.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - timestamp
              properties:
                timestamp:
                  type: string
                  format: date-time
                  description: Timestamp of commitment (typically morning)
                addictionIds:
                  type: array
                  items:
                    type: string
                  description: Specific addictions being committed to today
                notes:
                  type: string
                  maxLength: 500
                  description: Optional reflection notes
            example:
              timestamp: "2026-03-28T07:00:00Z"
              addictionIds: ["a_67890"]
              notes: "Feeling strong today. Looking forward to a meeting tonight."
      responses:
        '201':
          description: Created - Commitment recorded
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
            X-Correlation-Id:
              $ref: '#/components/headers/X-Correlation-Id'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      commitmentId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      type:
                        type: string
                        enum: [morning]
                      consecutiveDays:
                        type: integer
                        description: Current morning commitment streak
                      links:
                        $ref: '#/components/schemas/Links'
                  meta:
                    $ref: '#/components/schemas/Metadata'
              example:
                data:
                  commitmentId: cm_11111
                  timestamp: "2026-03-28T07:00:00Z"
                  type: morning
                  consecutiveDays: 47
                  links:
                    self: https://api.regalrecovery.com/v1/activities/commitments/morning/cm_11111
                meta:
                  createdAt: "2026-03-28T07:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/commitments/evening:
    post:
      operationId: createEveningCommitment
      tags: [Commitments]
      summary: Submit evening sobriety review
      description: |
        Record evening sobriety review with commitment status for the day.

        Reviews all active commitments and marks them as kept or broken.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - timestamp
                - commitmentReviews
              properties:
                timestamp:
                  type: string
                  format: date-time
                commitmentReviews:
                  type: array
                  items:
                    type: object
                    required:
                      - commitmentId
                      - kept
                    properties:
                      commitmentId:
                        type: string
                      kept:
                        type: boolean
                      notes:
                        type: string
                        maxLength: 500
                sobrietyMaintained:
                  type: boolean
                notes:
                  type: string
                  maxLength: 1000
            example:
              timestamp: "2026-03-28T21:00:00Z"
              commitmentReviews:
                - commitmentId: cm_77777
                  kept: true
                  notes: "Called sponsor at lunch"
                - commitmentId: cm_88888
                  kept: true
                  notes: "Attended Tuesday meeting"
              sobrietyMaintained: true
              notes: "Good day overall. Felt supported."
      responses:
        '201':
          description: Created - Evening review recorded
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      reviewId:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      commitmentsKept:
                        type: integer
                      commitmentsTotal:
                        type: integer
                      consistencyScore:
                        type: number
                        format: float
                        description: Percentage of commitments kept
                      links:
                        $ref: '#/components/schemas/Links'
                  meta:
                    $ref: '#/components/schemas/Metadata'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/journal:
    post:
      operationId: createJournalEntry
      tags: [Journals]
      summary: Create journal entry
      description: |
        Create a free-form or prompted journal entry.

        Supports ephemeral mode (auto-deleted after 30 days per user preference).
        Journal entries are never shared by default; opt-in permission required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJournalRequest'
            example:
              mode: morning
              content: "Today I'm grateful for my support group and 47 days of sobriety..."
              emotionalTags: ["grateful", "hopeful"]
              prompt: "What are you grateful for today?"
              isEphemeral: false
      responses:
        '201':
          description: Created - Journal entry saved
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listJournalEntries
      tags: [Journals]
      summary: List journal entries
      description: |
        Retrieve journal entries with pagination and optional filters.

        Ephemeral entries are included if not yet expired.
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [morning, evening, free-form, prompted]
          description: Filter by journal mode
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: sort
          in: query
          schema:
            type: string
            default: "-timestamp"
          description: "Sort field: -timestamp (desc), timestamp (asc)"
      responses:
        '200':
          description: OK - Journal entries retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/JournalEntry'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    type: object
                    properties:
                      page:
                        $ref: '#/components/schemas/PageMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/journal/{entryId}:
    get:
      operationId: getJournalEntry
      tags: [Journals]
      summary: Get journal entry by ID
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK - Journal entry retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/JournalEntry'
                  meta:
                    $ref: '#/components/schemas/Metadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      operationId: updateJournalEntry
      tags: [Journals]
      summary: Update journal entry
      description: |
        Update journal entry content or tags.

        Timestamp cannot be modified (immutable per FR2.7).
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  maxLength: 10000
                emotionalTags:
                  type: array
                  items:
                    type: string
                  maxItems: 10
      responses:
        '200':
          description: OK - Entry updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/JournalEntry'
                  meta:
                    $ref: '#/components/schemas/Metadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      operationId: deleteJournalEntry
      tags: [Journals]
      summary: Delete journal entry
      description: |
        Permanently delete journal entry.

        Cannot be undone. For ephemeral entries, manual deletion accelerates removal.
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content - Entry deleted
          headers:
            Api-Version:
              $ref: '#/components/headers/Api-Version'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/emotional-journal:
    post:
      operationId: createEmotionalJournalEntry
      tags: [Emotional Journal]
      summary: Create emotional journal entry
      description: |
        Record emotional awareness entry with automatic GPS location and optional selfie.

        Designed for frequent, low-friction use throughout the day. Supports ephemeral mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmotionalJournalRequest'
            example:
              timestamp: "2026-03-28T15:00:00Z"
              emotion: "anxiety"
              activity: "Preparing for meeting"
              reason: "Upcoming meeting with a difficult coworker"
              intensity: 6
              copingStrategy: "Called sponsor, did breathing exercise"
              location:
                latitude: 40.758
                longitude: -73.9855
                areaName: "Midtown East, NYC"
                accuracy: "high"
              selfieKey: "s3://regal-recovery-media/u_12345/selfies/temp_xyz.jpg"
              isEphemeral: true
      responses:
        '201':
          description: Created - Emotional journal entry saved
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmotionalJournalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listEmotionalJournalEntries
      tags: [Emotional Journal]
      summary: List emotional journal entries
      parameters:
        - name: emotion
          in: query
          schema:
            type: string
          description: Filter by emotion
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK - Emotional journal entries retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EmotionalJournalEntry'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    type: object
                    properties:
                      page:
                        $ref: '#/components/schemas/PageMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/time-journal:
    post:
      operationId: createTimeJournalEntry
      tags: [Time Journal]
      summary: Create time journal entry
      description: |
        Record interval-based (30-60 min) time journal entry with automatic GPS, sensor metadata, emotion, needs, and notes.

        Designed for pattern recognition across the day.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeJournalRequest'
            example:
              timestamp: "2026-03-28T14:00:00Z"
              emotion: "focused"
              intensity: 6
              activity: "Working on project report"
              needs: "Taking a break soon"
              notes: "Feeling productive. No urges today so far."
              location:
                latitude: 40.7128
                longitude: -74.006
                areaName: "Midtown, NYC"
                accuracy: "high"
              sensorData:
                motionState: "stationary"
                batteryLevel: 72
                screenTime: null
              selfieKey: "s3://regal-recovery-media/u_12345/selfies/tj_xyz.jpg"
              isEphemeral: false
      responses:
        '201':
          description: Created - Time journal entry saved
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeJournalResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listTimeJournalEntries
      tags: [Time Journal]
      summary: List time journal entries
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK - Time journal entries retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeJournalEntry'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    type: object
                    properties:
                      page:
                        $ref: '#/components/schemas/PageMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/check-ins:
    post:
      operationId: createCheckIn
      tags: [Check-Ins]
      summary: Submit daily recovery check-in
      description: |
        Submit structured daily or evening check-in with responses and computed score.

        Check-in questions adapt based on recovery stage (early/active/sustained).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckInRequest'
            example:
              type: daily
              responses:
                sobrietyStatus: "yes"
                urgeCount: 2
                meetingAttended: true
                spiritualPractices: true
                emotionalState: 7
                supportNetworkContact: true
                overallRecoveryHealth: 8
      responses:
        '201':
          description: Created - Check-in recorded
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckInResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listCheckIns
      tags: [Check-Ins]
      summary: List check-ins
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [daily, evening, morning]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: sort
          in: query
          schema:
            type: string
            default: "-timestamp"
      responses:
        '200':
          description: OK - Check-ins retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CheckIn'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    type: object
                    properties:
                      page:
                        $ref: '#/components/schemas/PageMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/faster-scale:
    post:
      operationId: createFASTERScaleEntry
      tags: [FASTER Scale]
      summary: Submit FASTER Scale assessment
      description: |
        Record FASTER Scale relapse stage assessment.

        Stages: Restoration → Forgetting Priorities → Anxiety → Speeding Up → Ticked Off → Exhausted → Relapse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFASTERScaleRequest'
            example:
              timestamp: "2026-03-28T20:00:00Z"
              stage: "Ticked_Off"
              indicators: ["irritability", "blame", "isolation"]
              notes: "Noticed I was snapping at coworkers today"
      responses:
        '201':
          description: Created - FASTER Scale entry saved
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FASTERScaleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listFASTERScaleEntries
      tags: [FASTER Scale]
      summary: List FASTER Scale entries
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [Restoration, Forgetting_Priorities, Anxiety, Speeding_Up, Ticked_Off, Exhausted, Relapse]
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK - FASTER Scale entries retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FASTERScaleEntry'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    type: object
                    properties:
                      page:
                        $ref: '#/components/schemas/PageMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/pci:
    post:
      operationId: createPCIEntry
      tags: [PCI]
      summary: Submit Personal Craziness Index
      description: |
        Record PCI assessment with checked behaviors and computed score.

        PCI tracks 12 relapse warning behaviors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePCIRequest'
            example:
              timestamp: "2026-03-28T19:00:00Z"
              checkedBehaviors: ["fantasy", "objectification", "isolation", "dishonesty"]
      responses:
        '201':
          description: Created - PCI entry saved
          headers:
            Location:
              schema:
                type: string
                format: uri
            Api-Version:
              $ref: '#/components/headers/Api-Version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PCIResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      operationId: listPCIEntries
      tags: [PCI]
      summary: List PCI entries
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: OK - PCI entries retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PCIEntry'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    type: object
                    properties:
                      page:
                        $ref: '#/components/schemas/PageMetadata'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /activities/urges:
    post:
      operationId: createUrgeLog
      tags: [Urges]
      summary: Log urge event
      description: |
        Record urge with intensity, triggers, duration, and outcome.

