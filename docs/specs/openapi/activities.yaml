components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: AWS Cognito JWT access token

  headers:
    Api-Version:
      description: Semantic version of the API
      schema:
        type: string
        example: "1.0.0"
    X-Correlation-Id:
      description: Request correlation ID for distributed tracing
      schema:
        type: string
        format: uuid

  schemas:
    CreateJournalRequest:
      type: object
      required:
        - mode
        - content
      properties:
        mode:
          type: string
          enum: [morning, evening, free-form, prompted]
        content:
          type: string
          maxLength: 10000
        emotionalTags:
          type: array
          items:
            type: string
          maxItems: 10
        prompt:
          type: string
          maxLength: 500
          description: Journal prompt (if prompted mode)
        isEphemeral:
          type: boolean
          default: false
          description: Auto-delete after 30 days

    JournalEntry:
      type: object
      properties:
        entryId:
          type: string
        timestamp:
          type: string
          format: date-time
        mode:
          type: string
        content:
          type: string
        emotionalTags:
          type: array
          items:
            type: string
        prompt:
          type: string
        isEphemeral:
          type: boolean
        ephemeralDeleteAt:
          type: string
          format: date-time
          nullable: true
        links:
          $ref: '#/components/schemas/Links'

    JournalEntryResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/JournalEntry'
        meta:
          $ref: '#/components/schemas/Metadata'

    CreateEmotionalJournalRequest:
      type: object
      required:
        - timestamp
        - emotion
        - activity
        - intensity
      properties:
        timestamp:
          type: string
          format: date-time
        emotion:
          type: string
          description: Primary emotion
        activity:
          type: string
          maxLength: 500
          description: What user is doing
        reason:
          type: string
          maxLength: 1000
          description: Why user feels this way
        intensity:
          type: integer
          minimum: 1
          maximum: 10
        copingStrategy:
          type: string
          maxLength: 500
        location:
          $ref: '#/components/schemas/Location'
        selfieKey:
          type: string
          description: S3 key for optional selfie
        isEphemeral:
          type: boolean
          default: false

    EmotionalJournalEntry:
      type: object
      properties:
        entryId:
          type: string
        timestamp:
          type: string
          format: date-time
        emotion:
          type: string
        activity:
          type: string
        reason:
          type: string
        intensity:
          type: integer
        copingStrategy:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        selfieKey:
          type: string
        isEphemeral:
          type: boolean
        ephemeralDeleteAt:
          type: string
          format: date-time
          nullable: true
        links:
          $ref: '#/components/schemas/Links'

    EmotionalJournalResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/EmotionalJournalEntry'
        meta:
          $ref: '#/components/schemas/Metadata'

    CreateTimeJournalRequest:
      type: object
      required:
        - timestamp
        - emotion
        - intensity
        - activity
      properties:
        timestamp:
          type: string
          format: date-time
        emotion:
          type: string
        intensity:
          type: integer
          minimum: 1
          maximum: 10
        activity:
          type: string
          maxLength: 500
        needs:
          type: string
          maxLength: 500
        notes:
          type: string
          maxLength: 1000
        location:
          $ref: '#/components/schemas/Location'
        sensorData:
          $ref: '#/components/schemas/SensorData'
        selfieKey:
          type: string
        isEphemeral:
          type: boolean
          default: false

    TimeJournalEntry:
      type: object
      properties:
        entryId:
          type: string
        timestamp:
          type: string
          format: date-time
        emotion:
          type: string
        intensity:
          type: integer
        activity:
          type: string
        needs:
          type: string
        notes:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        sensorData:
          $ref: '#/components/schemas/SensorData'
        selfieKey:
          type: string
        isEphemeral:
          type: boolean
        links:
          $ref: '#/components/schemas/Links'

    TimeJournalResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TimeJournalEntry'
        meta:
          $ref: '#/components/schemas/Metadata'

    Location:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        areaName:
          type: string
          description: City or neighborhood name
        accuracy:
          type: string
          enum: [high, medium, low]

    SensorData:
      type: object
      properties:
        motionState:
          type: string
          enum: [stationary, walking, running, driving, unknown]
        batteryLevel:
          type: integer
          minimum: 0
          maximum: 100
        screenTime:
          type: integer
          description: Screen time in minutes (today)
          nullable: true

    CreateCheckInRequest:
      type: object
      required:
        - type
        - responses
      properties:
        type:
          type: string
          enum: [daily, evening, morning]
        responses:
          type: object
          description: Structured check-in responses (questions adapt by recovery stage)
          additionalProperties: true

    CheckIn:
      type: object
      properties:
        checkInId:
          type: string
        timestamp:
          type: string
          format: date-time
        type:
          type: string
        responses:
          type: object
        score:
          type: integer
          description: Computed check-in health score (0-100)
        colorCode:
          type: string
          enum: [green, yellow, red]
        links:
          $ref: '#/components/schemas/Links'

    CheckInResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/CheckIn'
        meta:
          type: object
          properties:
            createdAt:
              type: string
              format: date-time
            consecutiveDays:
              type: integer

    CreateFASTERScaleRequest:
      type: object
      required:
        - timestamp
        - stage
      properties:
        timestamp:
          type: string
          format: date-time
        stage:
          type: string
          enum: [Restoration, Forgetting_Priorities, Anxiety, Speeding_Up, Ticked_Off, Exhausted, Relapse]
        indicators:
          type: array
          items:
            type: string
          description: Checked indicators for this stage
        notes:
          type: string
          maxLength: 1000

    FASTERScaleEntry:
      type: object
      properties:
        entryId:
          type: string
        timestamp:
          type: string
          format: date-time
        stage:
          type: string
        indicators:
          type: array
          items:
            type: string
        notes:
          type: string
        links:
          $ref: '#/components/schemas/Links'

    FASTERScaleResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/FASTERScaleEntry'
        meta:
          $ref: '#/components/schemas/Metadata'

    CreatePCIRequest:
      type: object
      required:
        - timestamp
        - checkedBehaviors
      properties:
        timestamp:
          type: string
          format: date-time
        checkedBehaviors:
          type: array
          items:
            type: string
          description: List of PCI behaviors checked
          maxItems: 12

    PCIEntry:
      type: object
      properties:
        entryId:
          type: string
        timestamp:
          type: string
          format: date-time
        checkedBehaviors:
          type: array
          items:
            type: string
        score:
          type: integer
          description: PCI score (count of checked behaviors)
        links:
          $ref: '#/components/schemas/Links'

    PCIResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PCIEntry'
        meta:
          $ref: '#/components/schemas/Metadata'

    CreateUrgeLogRequest:
      type: object
      required:
        - addictionId
        - intensity
      properties:
        addictionId:
          type: string
        intensity:
          type: integer
          minimum: 1
          maximum: 10
        triggers:
          type: array
          items:
            type: string
          maxItems: 10
        notes:
          type: string
          maxLength: 2000
        sobrietyMaintained:
          type: boolean
          default: true
        durationMinutes:
          type: integer
          minimum: 0

    UrgeLog:
      type: object
      properties:
        urgeId:
          type: string
        addictionId:
          type: string
        timestamp:
          type: string
          format: date-time
        intensity:
          type: integer
        triggers:
          type: array
          items:
            type: string
        notes:
          type: string
        sobrietyMaintained:
          type: boolean
        durationMinutes:
          type: integer
        resolved:
          type: boolean
        resolutionNotes:
          type: string
        links:
          $ref: '#/components/schemas/Links'

    UrgeLogResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/UrgeLog'
        meta:
          type: object
          properties:
            createdAt:
              type: string
              format: date-time
            followUpScheduled:
              type: string
              format: date-time
              description: Automatic follow-up notification time

    CreatePostMortemRequest:
      type: object
      required:
        - timestamp
        - relapseId
        - sections
      properties:
        timestamp:
          type: string
          format: date-time
        relapseId:
          type: string
          description: Reference to relapse record
        sections:
          type: object
          required:
            - whatHappened
            - earlyWarnings
            - fasterStage
            - emotionalState
            - whatWouldIDifferently
          properties:
            whatHappened:
              type: string
              maxLength: 2000
            earlyWarnings:
              type: string
              maxLength: 2000
            fasterStage:
              type: string
            emotionalState:
              type: string
              maxLength: 1000
            whatWouldIDifferently:
              type: string
              maxLength: 2000
        triggers:
          type: array
          items:
            type: string
          maxItems: 15
        actionItems:
          type: array
          items:
            type: string
          maxItems: 10

    PostMortemAnalysis:
      type: object
      properties:
        analysisId:
          type: string
        timestamp:
          type: string
          format: date-time
        relapseId:
          type: string
        sections:
          type: object
        triggers:
          type: array
          items:
            type: string
        actionItems:
          type: array
          items:
            type: string
        links:
          $ref: '#/components/schemas/Links'

    PostMortemResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PostMortemAnalysis'
        meta:
          $ref: '#/components/schemas/Metadata'

    CreateSpouseCheckInPrepRequest:
      type: object
      required:
        - timestamp
        - format
      properties:
        timestamp:
          type: string
          format: date-time
        format:
          type: string
          enum: [FANOS, FITNAP]
        feelings:
          type: object
          properties:
            primary:
              type: string
            secondary:
              type: string
            notes:
              type: string
              maxLength: 1000
        appreciation:
          type: string
          maxLength: 1000
        needs:
          type: string
          maxLength: 1000
        ownership:
          type: string
          maxLength: 1000
        sobriety:
          type: string
          maxLength: 1000

    SpouseCheckInPrep:
      type: object
      properties:
        entryId:
          type: string
        timestamp:
          type: string
          format: date-time
        format:
          type: string
        feelings:
          type: object
        appreciation:
          type: string
        needs:
          type: string
        ownership:
          type: string
        sobriety:
          type: string
        links:
          $ref: '#/components/schemas/Links'

    SpouseCheckInPrepResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/SpouseCheckInPrep'
        meta:
          $ref: '#/components/schemas/Metadata'

    Links:
      type: object
      properties:
        self:
          type: string
          format: uri

    PaginationLinks:
      type: object
      properties:
        self:
          type: string
          format: uri
        next:
          type: string
          format: uri
          nullable: true
        prev:
          type: string
          format: uri
          nullable: true
        first:
          type: string
          format: uri
          nullable: true
        last:
          type: string
          format: uri
          nullable: true

    PageMetadata:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
        prevCursor:
          type: string
          nullable: true
        limit:
          type: integer

    Metadata:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ErrorObject'

    ErrorObject:
      type: object
      required:
        - status
        - title
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          pattern: '^rr:0x[0-9A-F]{8}$'
        status:
          type: integer
        title:
          type: string
        detail:
          type: string
        correlationId:
          type: string
          format: uuid
        source:
          type: object
        links:
          type: object

  responses:
    BadRequest:
      description: Bad Request - Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized - Missing or invalid authentication
      headers:
        WWW-Authenticate:
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    UnprocessableEntity:
      description: Unprocessable Entity - Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal Server Error - Unexpected server failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
